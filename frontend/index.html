<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SmartLens — AI Wellness Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08091a;--surface:#0f1022;--card:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.08);--text:#e8eaf6;--muted:rgba(255,255,255,.45);
  --purple:#7c6fef;--teal:#2dd4bf;--amber:#fbbf24;--red:#f87171;--green:#34d399;--r:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 36px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--teal));display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

main{max-width:800px;margin:0 auto;padding:80px 24px;text-align:center}

.hero{margin-bottom:60px}
.hero h1{font-size:42px;font-weight:800;letter-spacing:-1px;margin-bottom:16px;background:linear-gradient(135deg,var(--text),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:16px;color:var(--muted);line-height:1.6;max-width:500px;margin:0 auto}

.buttons{display:flex;flex-direction:column;gap:20px;max-width:400px;margin:0 auto}

.btn{display:flex;align-items:center;justify-content:center;gap:12px;padding:20px 32px;border-radius:14px;font-size:18px;font-weight:700;text-decoration:none;transition:all .3s ease;border:1px solid var(--border)}

.btn-red{background:rgba(248,113,113,.1);color:var(--red)}
.btn-red:hover{background:rgba(248,113,113,.2);transform:translateY(-3px);box-shadow:0 8px 32px rgba(248,113,113,.15)}

.btn-teal{background:rgba(45,212,191,.1);color:var(--teal)}
.btn-teal:hover{background:rgba(45,212,191,.2);transform:translateY(-3px);box-shadow:0 8px 32px rgba(45,212,191,.15)}

.btn-amber{background:linear-gradient(135deg,var(--amber),#f59e0b);color:#000;border:none}
.btn-amber:hover{opacity:.9;transform:translateY(-3px);box-shadow:0 8px 32px rgba(251,191,36,.25)}

.btn-icon{font-size:24px}

footer{text-align:center;padding:30px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;margin-top:60px}

@media(max-width:600px){
  .hero h1{font-size:32px}
  .btn{padding:16px 24px;font-size:16px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔮</div>
    <div class="logo-name">SmartLens</div>
  </div>
</header>

<main>
  <div class="hero">
    <h1>AI Wellness Dashboard</h1>
    <p>Choose a tool to get started with AI-powered analysis</p>
  </div>

  <div class="buttons">
    <a href="/fake-news.html" class="btn btn-red">
      <span class="btn-icon">📰</span>
      <span>Fake News</span>
    </a>

    <a href="/health-checks.html" class="btn btn-teal">
      <span class="btn-icon">❤️</span>
      <span>Health Checks</span>
    </a>

    <a href="/SmartLens_HK_Final.html" class="btn btn-amber">
      <span class="btn-icon">🍽️</span>
      <span>Food Calories</span>
    </a>
  </div>
</main>

<footer>
  SmartLens AI Wellness Dashboard · Powered by OpenRouter
</footer>

</body>
</html>
