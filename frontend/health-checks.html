<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SmartLens — Health Checks</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08091a;--surface:#0f1022;--card:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.08);--text:#e8eaf6;--muted:rgba(255,255,255,.45);
  --purple:#7c6fef;--teal:#2dd4bf;--r:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 36px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--teal));display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-name{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.back-link{color:var(--muted);text-decoration:none;font-size:14px}
.back-link:hover{color:var(--text)}

main{max-width:800px;margin:0 auto;padding:80px 24px;text-align:center}
.empty-icon{font-size:64px;margin-bottom:20px}
h1{font-size:28px;font-weight:700;margin-bottom:12px;color:var(--teal)}
p{color:var(--muted);font-size:16px}

footer{text-align:center;padding:30px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;margin-top:60px}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-icon">🔮</div>
    <div class="logo-name">SmartLens</div>
  </a>
  <a href="/" class="back-link">← Back</a>
</header>

<main>
  <div class="empty-icon">❤️</div>
  <h1>Health Checks</h1>
  <p>This feature is coming soon. Please check back later.</p>
</main>

<footer>
  SmartLens AI Wellness Dashboard · Powered by OpenRouter
</footer>

</body>
</html>
