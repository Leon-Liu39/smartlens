worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend_pool {
        server 127.0.0.1:9002;
        keepalive 32;
    }

    limit_req_zone  $binary_remote_addr zone=api_general:10m rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=api_upload:10m  rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=per_ip:10m;

    server {
        listen 8889;
        listen [::]:8889;
        server_name localhost;
        charset utf-8;

        client_max_body_size 15M;

        add_header X-Content-Type-Options  nosniff;
        add_header X-Frame-Options         SAMEORIGIN;
        add_header Referrer-Policy         strict-origin-when-cross-origin;

        location / {
            root /Users/civane/.openclaw/workspace/smartlens/frontend;
            index index.html;
            try_files $uri $uri/ =404;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        location /api/notifications/stream {
            proxy_pass         http://backend_pool/notifications/stream;
            proxy_http_version 1.1;
            proxy_set_header   Connection  "";
            proxy_set_header   Host        $host;
            proxy_set_header   X-Real-IP   $remote_addr;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
            add_header         Cache-Control no-cache;
            add_header         X-Accel-Buffering no;
        }

        location /api/calories/ {
            limit_req   zone=api_upload burst=5 nodelay;
            limit_conn  per_ip 3;
            proxy_pass  http://backend_pool/calories/;
            proxy_http_version 1.1;
            proxy_set_header Host        $host;
            proxy_set_header X-Real-IP   $remote_addr;
            proxy_read_timeout 60s;
            client_max_body_size 15M;
        }

        location /api/ {
            limit_req  zone=api_general burst=15 nodelay;
            rewrite    ^/api/(.*)$ /$1 break;
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout 30s;
        }

        location /health {
            proxy_pass http://backend_pool/health;
        }

        server_tokens off;
    }
}
